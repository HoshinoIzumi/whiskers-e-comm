services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whiskers
      POSTGRES_PASSWORD: whiskers
      POSTGRES_DB: whiskers
    ports:
      - '5432:5432'
    volumes:
      - whiskers_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U whiskers -d whiskers']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  whiskers_pg_data:
